<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT From Heshan | Premium Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyCHf-YhlMZSoLw1ll4KNfgmTPJHAvzaMjI", authDomain: "ictfromheshan.firebaseapp.com", projectId: "ictfromheshan", storageBucket: "ictfromheshan.firebasestorage.app", appId: "1:899561130232:web:e6bc8a688779ae28b2930d" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.handleLimitedLogin = (e) => {
            e.preventDefault();
            const data = { name: document.getElementById('lim-name').value, institute: document.getElementById('lim-institute').value, year: document.getElementById('lim-year').value };
            localStorage.setItem('limitedUser', JSON.stringify(data));
            location.reload();
        };

        onAuthStateChanged(auth, (user) => {
            const lim = JSON.parse(localStorage.getItem('limitedUser'));
            if(user && user.emailVerified) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('nav-user-name').innerText = user.displayName;
            } else if(lim) {
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('limited-content').classList.remove('hidden');
                document.getElementById('lim-nav-name').innerText = lim.name;
            }
        });

        window.logoutUser = () => { localStorage.removeItem('limitedUser'); signOut(auth).then(() => location.reload()); };
        
        window.submitComment = (e) => {
            e.preventDefault();
            const lim = JSON.parse(localStorage.getItem('limitedUser'));
            const user = auth.currentUser;
            addDoc(collection(db, "comments"), { username: lim ? lim.name : user.displayName, text: document.getElementById('comment-text').value, timestamp: Date.now(), dateString: new Date().toLocaleString() });
            document.getElementById('comment-form').reset();
        };
    </script>
</head>
<body class="bg-gray-900 text-white">

    <div id="auth-gate" class="fixed inset-0 bg-gray-950 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 p-6 rounded-2xl w-full max-w-sm border border-gray-800">
            <h2 class="text-xl font-bold mb-4 text-cyan-400 text-center">LOGIN</h2>
            <form onsubmit="handleLogin(event)" class="space-y-3">
                <input type="email" id="login-email" placeholder="Email" class="w-full bg-gray-950 p-2 rounded text-xs">
                <input type="password" id="login-password" placeholder="Password" class="w-full bg-gray-950 p-2 rounded text-xs">
                <button class="w-full bg-cyan-600 py-2 rounded font-bold text-xs">LOGIN</button>
            </form>
            <div class="mt-8 border-t border-gray-800 pt-6">
                <form onsubmit="handleLimitedLogin(event)" class="space-y-3">
                    <input type="text" id="lim-name" placeholder="Full Name" required class="w-full bg-gray-950 p-2 rounded text-xs">
                    <input type="text" id="lim-institute" placeholder="Institute" required class="w-full bg-gray-950 p-2 rounded text-xs">
                    <input type="text" id="lim-year" placeholder="AL Year" required class="w-full bg-gray-950 p-2 rounded text-xs">
                    <button class="w-full bg-yellow-600 py-2 rounded font-bold text-xs">JOIN AS GUEST</button>
                </form>
            </div>
        </div>
    </div>

    <div id="main-content" class="hidden">
        <nav class="bg-gray-800 p-4 flex justify-between items-center">
            <span id="nav-user-name" class="font-bold"></span>
            <button onclick="logoutUser()" class="bg-red-600 px-3 py-1 rounded text-xs">Logout</button>
        </nav>
        
        <section class="p-6">
            <h2 class="text-xl font-bold mb-4">Logic Gate Simulator</h2>
            <div class="grid grid-cols-3 gap-4 max-w-sm mx-auto bg-gray-950 p-6 rounded-xl">
                <button onclick="toggleInput('A')" id="btn-inputA" class="bg-gray-800 p-2 rounded">A: 0</button>
                <span class="text-center font-bold">AND</span>
                <div class="bg-red-900 p-2 text-center rounded">Out: <span id="txt-output">0</span></div>
            </div>
        </section>

        <section class="p-6">
            <h2 class="text-xl font-bold mb-4">Converters</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="num-decimal" oninput="convertFrom('decimal')" placeholder="Decimal" class="bg-gray-800 p-2 rounded">
                <input type="text" id="num-binary" oninput="convertFrom('binary')" placeholder="Binary" class="bg-gray-800 p-2 rounded">
                <textarea id="unicode-input" onkeyup="convertSinglishToSinhala()" placeholder="Type Singlish..." class="bg-gray-800 p-2 rounded col-span-2"></textarea>
                <div id="unicode-output" class="bg-gray-950 p-2 rounded col-span-2 text-orange-400">...</div>
            </div>
        </section>
        
        <section class="p-6">
            <form id="comment-form" onsubmit="submitComment(event)">
                <textarea id="comment-text" class="w-full bg-gray-800 p-2 rounded" placeholder="Comment..."></textarea>
                <button class="bg-yellow-500 px-4 py-1 rounded mt-2">Post</button>
            </form>
        </section>
    </div>

    <div id="limited-content" class="hidden">
        <nav class="bg-gray-800 p-4 flex justify-between items-center">
            <span id="lim-nav-name" class="text-yellow-500 font-bold"></span>
            <button onclick="logoutUser()" class="bg-red-600 px-3 py-1 rounded text-xs">Logout</button>
        </nav>
        <section class="p-10 text-center">
            <h2 class="mb-5 font-bold">Welcome Guest!</h2>
            <button class="bg-green-600 px-6 py-3 rounded-lg font-black"><i class="fa-solid fa-credit-card mr-2"></i>PAY WITH CARD</button>
        </section>
        <section class="p-6">
            <form id="comment-form" onsubmit="submitComment(event)">
                <textarea id="comment-text" class="w-full bg-gray-800 p-2 rounded" placeholder="Comment..."></textarea>
                <button class="bg-yellow-500 px-4 py-1 rounded mt-2">Post</button>
            </form>
        </section>
    </div>

    <script>
        // මෙතනට ඔබේ පෙර පැවති Logic Gate, Converter සහ Unicode Logic එකේ JavaScript කොටස් දාන්න
    </script>
</body>
</html>
