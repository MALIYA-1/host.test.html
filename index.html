<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT From Heshan | Full System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: white; font-family: 'Poppins', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-black">
        <div class="glass p-8 rounded-3xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-cyan-400 mb-6">ICT FROM HESHAN</h1>
            <input id="name" type="text" placeholder="නම" class="w-full bg-slate-800 p-3 rounded-lg mb-4 outline-none">
            <button onclick="login()" class="w-full bg-cyan-600 py-3 rounded-lg font-bold">පද්ධතියට ඇතුල් වන්න</button>
        </div>
    </div>

    <div id="main-ui" class="hidden p-8">
        <nav class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold text-cyan-400">ICT FROM HESHAN</h1>
            <div id="user-display" class="bg-slate-800 px-4 py-2 rounded-full"></div>
        </nav>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass p-6 rounded-2xl">
                <h3 class="font-bold mb-4"><i class="fa-solid fa-microchip mr-2"></i> Logic Gate Sim</h3>
                <div class="h-20 bg-black flex items-center justify-center text-4xl border border-cyan-500 rounded-xl" id="gate">0</div>
                <button onclick="toggleGate()" class="mt-4 w-full bg-slate-700 py-2 rounded">Toggle Gate</button>
            </div>

            <div class="glass p-6 rounded-2xl">
                <h3 class="font-bold mb-4"><i class="fa-solid fa-video mr-2"></i> Recordings</h3>
                <ul class="text-sm space-y-2 text-slate-400">
                    <li>- Number System (Part 1)</li>
                    <li>- Logic Gates (Advanced)</li>
                </ul>
            </div>

            <div class="glass p-6 rounded-2xl border-orange-500 border">
                <h3 class="font-bold text-orange-500 mb-4">Admin Panel</h3>
                <input placeholder="පාඩමේ නම" class="w-full bg-black p-2 rounded mb-2 outline-none">
                <button class="w-full bg-orange-600 py-2 rounded">Save Lesson</button>
            </div>
        </div>
    </div>

    <button onclick="toggleChat()" class="fixed bottom-10 right-10 bg-cyan-600 w-16 h-16 rounded-full shadow-2xl">
        <i class="fa-solid fa-robot text-2xl"></i>
    </button>

    <script>
        function login() {
            const name = document.getElementById('name').value;
            document.getElementById('user-display').innerText = name;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
        }

        let state = 0;
        function toggleGate() { state = state === 0 ? 1 : 0; document.getElementById('gate').innerText = state; }

        function toggleChat() { alert("AI Assistant: හේෂාන් සර්ගේ පන්තියට සාදරයෙන් පිළිගනිමු!"); }
    </script>
</body>
</html>
