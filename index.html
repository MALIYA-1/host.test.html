<!DOCTYPE html>
<html lang="si" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT From Heshan | Premium A/L LMS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #050505; color: white; }
        .cyber-card { background: rgba(10, 10, 15, 0.8); border: 1px solid #1e293b; backdrop-filter: blur(10px); }
        .text-glow { text-shadow: 0 0 10px rgba(6, 182, 212, 0.5); }
    </style>
</head>
<body>

    <div id="signup-screen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-4">
        <div class="cyber-card p-8 rounded-3xl w-full max-w-md border-cyan-500/50 shadow-[0_0_50px_-12px_rgba(6,182,212,0.3)]">
            <h2 class="text-3xl font-bold text-cyan-400 mb-6 text-center tracking-widest">ICT FROM HESHAN</h2>
            <form onsubmit="initDashboard(event)" class="space-y-4">
                <input type="text" id="reg-name" required placeholder="සම්පූර්ණ නම" class="w-full bg-slate-900 border-slate-700 border p-3 rounded-lg focus:border-cyan-500 outline-none">
                <select id="reg-year" class="w-full bg-slate-900 border-slate-700 border p-3 rounded-lg outline-none">
                    <option value="2026">2026 A/L</option><option value="2027">2027 A/L</option><option value="2028">2028 A/L</option>
                </select>
                <select id="reg-inst" class="w-full bg-slate-900 border-slate-700 border p-3 rounded-lg outline-none">
                    <option value="Pencil Opera">Pencil Opera (Kurunegala)</option>
                    <option value="Ziyon Pen">Ziyon Pen (Horana)</option>
                    <option value="Sisulka">Sisulka (Rathnapura)</option>
                </select>
                <input type="text" id="reg-id" required placeholder="Institute ID Number" class="w-full bg-slate-900 border-slate-700 border p-3 rounded-lg outline-none">
                <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-lg font-bold text-black uppercase tracking-widest">Login to LMS</button>
            </form>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen">
        <nav class="p-6 flex justify-between items-center border-b border-slate-800">
            <h1 class="text-2xl font-bold text-cyan-400">ICT FROM HESHAN</h1>
            <div id="user-info" class="text-sm font-mono text-cyan-500"></div>
        </nav>

        <section class="p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="cyber-card p-6 rounded-2xl hover:border-cyan-500 transition cursor-pointer">
                <i class="fa-solid fa-microchip text-3xl text-cyan-500"></i>
                <h3 class="mt-4 font-bold">Simulators</h3>
            </div>
            <div class="cyber-card p-6 rounded-2xl hover:border-emerald-500 transition cursor-pointer">
                <i class="fa-solid fa-play text-3xl text-emerald-500"></i>
                <h3 class="mt-4 font-bold">Recordings</h3>
            </div>
            <div class="cyber-card p-6 rounded-2xl hover:border-purple-500 transition cursor-pointer">
                <i class="fa-solid fa-wallet text-3xl text-purple-500"></i>
                <h3 class="mt-4 font-bold">Pay Fees</h3>
            </div>
            <div class="cyber-card p-6 rounded-2xl border-orange-900 bg-orange-950/20">
                <i class="fa-solid fa-user-shield text-3xl text-orange-500"></i>
                <h3 class="mt-4 font-bold">Admin Panel</h3>
            </div>
        </section>

        <div class="fixed bottom-10 right-10 z-50">
            <button onclick="toggleChat()" class="w-16 h-16 bg-cyan-600 rounded-full flex items-center justify-center animate-bounce shadow-2xl">
                <i class="fa-solid fa-robot text-2xl"></i>
            </button>
            <div id="chat-box" class="hidden absolute bottom-20 right-0 w-80 cyber-card p-4 rounded-xl">
                <h4 class="font-bold border-b border-slate-700 pb-2 mb-2">ICT AI Assistant</h4>
                <p class="text-sm text-slate-400">හේෂාන් සර්ගේ පන්තියේ පාඩම් ගැන ඔයාට මොනවාද දැනගන්න ඕනේ?</p>
                <input type="text" placeholder="Type here..." class="w-full mt-4 bg-slate-950 p-2 rounded outline-none border border-slate-700 text-xs">
            </div>
        </div>
    </div>

    <script>
        function initDashboard(e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value;
            document.getElementById('user-info').innerText = "STUDENT: " + name.toUpperCase();
            document.getElementById('signup-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }

        function toggleChat() {
            document.getElementById('chat-box').classList.toggle('hidden');
        }
    </script>
</body>
</html>
